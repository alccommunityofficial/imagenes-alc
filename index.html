<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destino Final - ALC</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111; 
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: #1a1a1a; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center;
            border: 1px solid #4C0030;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #4C0030 100%);
            padding: 60px 30px;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(224, 160, 192, 0.4));
        }

        .content {
            padding: 50px 40px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e0a0c0;
            margin-bottom: 30px;
        }

        .phrase {
            font-size: 18px;
            line-height: 1.8;
            color: #c0c0c0;
            font-style: italic;
        }

        .highlight {
            color: #ffffff;
            font-weight: bold;
            display: block;
            margin-top: 20px;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .footer {
            padding: 20px;
            background: #111111;
            font-size: 12px;
            color: #444444;
            border-top: 1px solid #222222;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://media.alc.abrdns.com/img/W4QJ4KD.png" alt="ALC Logo" class="logo">
            <h1>Misión Cumplida</h1>
        </div>
        <div class="content">
            <p class="phrase">
                Excelente, llegaste hasta acá... <br>
                informámelo <span class="highlight">#LuZiFer</span>
            </p>
            <div style="width:60px; height:2px; background:#4C0030; margin:30px auto;"></div>
            <p style="color: #888888; letter-spacing: 1px;">Veremos qué haremos con vos.</p>
            <p style="font-size: 14px; color: #9b1060; font-weight: bold; text-transform: uppercase;">Algo glorioso te espera.</p>
        </div>
        <div class="footer">
            Argentina Limando Carter &copy; 2026
        </div>
    </div>
</body>
</html>
